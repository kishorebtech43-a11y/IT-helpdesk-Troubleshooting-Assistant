<!DOCTYPE html>
<html>

<head>
    <title>IT Helpdesk Assistant</title>
</head>

<body>

    <h1>🛠️ IT Helpdesk Assistant</h1>

    <form method="POST">
        <select name="issue">
            <option value="internet">Internet Issue</option>
            <option value="slow">Slow System</option>
            <option value="software">Software Issue</option>
            <option value="printer">Printer Issue</option>
        </select>

        <button type="submit">Get Solution</button>
    </form>

    <h3>{{ solution }}</h3>

</body>

</html>
